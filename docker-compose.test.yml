version: "3.9"

services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inkstone
      POSTGRES_PASSWORD: inkstone
      POSTGRES_DB: inkstone_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkstone"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs: /var/lib/postgresql/data
